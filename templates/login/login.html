<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login|ToDoList</title>
    <link rel="stylesheet" href="http://localhost:80/loginStyle.css">
</head>
<body>
    <header>
        <div>
            <h1>ToDoList</h1>
        </div>
    </header>

    <main>
        <div>
            <figure>
                <img src="./assets/loginAvatar.svg" alt="Login avatar svg">
            </figure>
            <form action="" method="post" id="signInForm">
                <fieldset>
                    <legend>Log-in</legend>
                    <div class="mainInputsLogin">
                        <label for="inputUsername">Username:</label>
                        <input type="text" id="inputUsername" placeholder="Username or email">
                        <label for="inputPassword">Password:</label>
                        <input type="password" id="inputPassword" placeholder="Password">
                    </div> 
                    <div>
                        <button id="btnLogin">Log in</button>
                        <button id="btnSignUp">Sign Up</button>
                    </div>
                </fieldset>
            </form>
        </div>
   </main>
</body>
</html>
